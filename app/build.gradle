plugins { id 'com.android.application' }

android {
    namespace 'net.sockc.wxhide'
    compileSdk 35

    defaultConfig {
        applicationId 'net.sockc.wxhide'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Xposed/LSPosed legacy API. compileOnly = 不打包进 APK。
    compileOnly 'de.robv.android.xposed:api:82'
}
